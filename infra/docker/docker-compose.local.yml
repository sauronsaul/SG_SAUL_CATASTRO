name: sg-catastro

# ============================================================
# SG_SAUL_CATASTRO — Overrides para modo LOCAL
# Uso: docker compose --env-file .env \
#        -f infra/docker/docker-compose.yml \
#        -f infra/docker/docker-compose.local.yml up -d
# ============================================================

services:

  # En local la API corre en modo Development: Swagger habilitado,
  # HTTPS no requerido para JWT y logs más verbosos.
  api:
    environment:
      ASPNETCORE_ENVIRONMENT: Development
