# ============================================================
# pg_hba.conf — SG_SAUL_CATASTRO
# ============================================================
# Política: scram-sha-256 para TODAS las conexiones, sin excepción.
#
# Por qué esto importa en desarrollo:
#   - Consistencia con producción: el contenedor local se comporta
#     igual que el servidor. Sin "funciona en dev, falla en prod".
#   - Acceso por docker exec no da privilegios gratuitos: quien
#     ejecute `docker exec sg_postgres psql ...` todavía necesita
#     el password. Evita escalación trivial si el host es comprometido.
#   - Valida el flujo real de autenticación desde el primer día.
#
# Ver ADR 0015.
# ============================================================

# TYPE  DATABASE  USER  ADDRESS         METHOD
local   all       all                   scram-sha-256
host    all       all   127.0.0.1/32    scram-sha-256
host    all       all   ::1/128         scram-sha-256
host    all       all   0.0.0.0/0       scram-sha-256
