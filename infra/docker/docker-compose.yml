name: sg-catastro

# ============================================================
# SG_SAUL_CATASTRO — Docker Compose base
# Uso: docker compose --env-file .env -f infra/docker/docker-compose.yml up -d
# Para modo local combinar con docker-compose.local.yml
# Para producción combinar con docker-compose.prod.yml
# ============================================================

services:

  # ----------------------------------------------------------
  # PostgreSQL 16 + PostGIS 3.4
  # ----------------------------------------------------------
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: sg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # Fuerza scram-sha-256 durante initdb (primera inicialización).
      # Ver ADR 0015.
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      POSTGRES_HOST_AUTH_METHOD: scram-sha-256
    volumes:
      - sg_postgres_data:/var/lib/postgresql/data
      - ../../database/init:/docker-entrypoint-initdb.d:ro
      # pg_hba.conf personalizado: scram-sha-256 para todas las conexiones.
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    # Apunta a nuestro pg_hba.conf en lugar del generado por initdb.
    command: postgres -c hba_file=/etc/postgresql/pg_hba.conf
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    networks:
      - sg_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # MinIO — almacenamiento S3-compatible para documentos
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: sg_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - sg_minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - sg_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ----------------------------------------------------------
  # API Backend (ASP.NET Core 10)
  # ----------------------------------------------------------
  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
    container_name: sg_api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__Default: "Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true"
      JWT_SECRET: ${JWT_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      JWT_AUDIENCE: ${JWT_AUDIENCE}
      JWT_EXPIRY_MINUTES: ${JWT_EXPIRY_MINUTES:-15}
      REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:-7}
      ADMIN_INITIAL_EMAIL: ${ADMIN_INITIAL_EMAIL}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD}
    volumes:
      - sg_api_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    networks:
      - sg_network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # Caddy — reverse proxy (TLS automático en modo servidor)
  # ----------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: sg_caddy
    restart: unless-stopped
    volumes:
      - ./caddy/Caddyfile.local:/etc/caddy/Caddyfile:ro
      - sg_caddy_data:/data
      - sg_caddy_config:/config
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    networks:
      - sg_network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      api:
        condition: service_healthy

# ------------------------------------------------------------
# Volúmenes nombrados — persisten entre reinicios
# ------------------------------------------------------------
volumes:
  sg_postgres_data:
    name: sg_postgres_data
  sg_minio_data:
    name: sg_minio_data
  sg_caddy_data:
    name: sg_caddy_data
  sg_caddy_config:
    name: sg_caddy_config
  sg_api_logs:
    name: sg_api_logs

# ------------------------------------------------------------
# Red interna
# ------------------------------------------------------------
networks:
  sg_network:
    name: sg_network
    driver: bridge
