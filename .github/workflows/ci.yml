name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  # ------------------------------------------------------------
  # Job 1: Validar sintaxis de archivos YAML
  # ------------------------------------------------------------
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar yamllint
        run: pip install yamllint

      - name: Validar archivos YAML
        run: |
          YAML_TRUTHY="truthy: {allowed-values: ['true', 'false', 'on', 'off']}"
          YAMLLINT_CFG="{extends: default, rules: {line-length: {max: 120}, ${YAML_TRUTHY}}}"
          yamllint \
            --config-data "$YAMLLINT_CFG" \
            .github/workflows/ \
            infra/docker/docker-compose.yml \
            infra/docker/docker-compose.local.yml \
            infra/docker/docker-compose.prod.yml

  # ------------------------------------------------------------
  # Job 2: Validar que docker-compose es sintácticamente correcto
  # ------------------------------------------------------------
  docker-compose-validate:
    name: Validar Docker Compose
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Crear .env desde .env.example
        run: cp .env.example .env

      - name: Reemplazar placeholders con valores de prueba
        run: |
          sed -i 's/<CAMBIAR_PASSWORD_SEGURO>/TestPassword123!/g' .env
          sed -i 's/<CAMBIAR_CLAVE_SECRETA_MINIMO_32_CARACTERES>/TestSecretKey1234567890123456789012/g' .env

      - name: Validar docker-compose base
        run: |
          docker compose \
            --env-file .env \
            -f infra/docker/docker-compose.yml \
            config --quiet

      - name: Validar docker-compose base + local
        run: |
          docker compose \
            --env-file .env \
            -f infra/docker/docker-compose.yml \
            -f infra/docker/docker-compose.local.yml \
            config --quiet

  # ------------------------------------------------------------
  # Job 3: Placeholder — tests reales desde Sprint 1+
  # ------------------------------------------------------------
  placeholder-test:
    name: Tests (placeholder)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tests pendientes
        run: echo "Tests pendientes — se implementan desde Sprint 1 (backend) y Sprint 4 (frontend)"

  # ------------------------------------------------------------
  # Job 4: Detección de secretos con gitleaks (ADR 0042 — Capa 3)
  # Binario directo, versión clavada = misma que el hook local.
  # ------------------------------------------------------------
  gitleaks:
    name: Detección de secretos (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: "8.30.1"   # misma versión que el hook local (consistencia local↔CI)
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0           # historial completo: necesario para escanear el rango en PRs

      - name: Instalar gitleaks ${{ env.GITLEAKS_VERSION }}
        run: |
          # yamllint disable-line rule:line-length
          GL_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "$GL_URL" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Escanear secretos (config del repo)
        run: |
          gitleaks git . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --report-format sarif \
            --report-path gitleaks-report.sarif
          echo "✓ gitleaks: sin secretos en el historial escaneado."

      - name: Publicar reporte si falla
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.sarif
